# Git Flow CLI - Aliases mejorados (versión global)
# Estos aliases usan el comando global git-flow-cli.sh sin rutas absolutas
# Agrega este contenido a tu archivo .gitconfig

[alias]
	# --- CREAR BRANCHES ---
	crear-feature = "!f() { \
	if [ -z \"$1\" ]; then \
	echo '⚠️ Uso: git crear-feature <nombre>'; exit 1; \
	fi; \
	git-flow-cli.sh crear feature \"$1\"; \
	}; f"

	crear-fix = "!f() { \
	if [ -z \"$1\" ]; then \
	echo '⚠️ Uso: git crear-fix <nombre>'; exit 1; \
	fi; \
	git-flow-cli.sh crear fix \"$1\"; \
	}; f"

	crear-release = "!f() { \
	if [ -z \"$1\" ]; then \
	echo '⚠️ Uso: git crear-release <version>'; exit 1; \
	fi; \
	git-flow-cli.sh crear release \"$1\"; \
	}; f"

	crear-hotfix = "!f() { \
	if [ -z \"$1\" ]; then \
	echo '⚠️ Uso: git crear-hotfix <nombre>'; exit 1; \
	fi; \
	git-flow-cli.sh crear hotfix \"$1\"; \
	}; f"

	# --- CERRAR BRANCHES ---
	cerrar = "!f() { \
	if [ -n \"$1\" ]; then \
	git-flow-cli.sh cerrar \"$1\"; \
	else \
	git-flow-cli.sh cerrar; \
	fi; \
	}; f"

	# --- DEPLOY ---
	deploy = "!f() { \
	if [ -n \"$1\" ]; then \
	git-flow-cli.sh deploy \"$1\"; \
	else \
	git-flow-cli.sh deploy; \
	fi; \
	}; f"

	# --- SYNC ---
	sync = "!git-flow-cli.sh sync"

	# --- STATUS ---
	status-flow = "!git-flow-cli.sh status"

	# --- INIT ---
	init-flow = "!git-flow-cli.sh init"

	# --- HELP ---
	help-flow = "!git-flow-cli.sh help"
